# Claude Hook Guard v1 default policy
#
# This file is intended to be production-ready as shipped.
# Local users may copy and edit it after installation.

[profiles._default]
tools = ["Skill"]
mcp-tools = []

[profiles.orchestrator]
aliases = ["", "orchestrator"]
tools = [
  "Agent",
  "Read",
  "Search",
  "AskUserQuestion",
  "Task",
  "TaskCreate",
  "TaskUpdate",
  "TaskGet",
  "TaskList",
  "TaskOutput",
  "TodoRead",
  "TodoWrite",
  "Skill",
  "Bash",
]
mcp-tools = [
  "mcp__HubSpotDev__fetch-doc",
  "mcp__HubSpotDev__search-doc",
  "mcp__atlassian__*",
  "mcp__mcp-atlassian__*",
  "mcp__mcp_atlassian__*",
  "mcp__Atlassian_MCP_Server__*",
  "mcp__atlassian_mcp_server__*",
  "mcp__hfs-api__*",
  "mcp__hfs_api__*",
]
commands = { categories = ["bd-read", "bd-write"], structure = { single-command = true, no-redirection = true } }
agent = { spawn = { allow = [
  { profile = "search", may-bypass = true },
  { profile = "ast-search", may-bypass = true },
  { profile = "lsp-search", may-bypass = true },
  { profile = "curl", may-bypass = true },
  { profile = "docs", may-bypass = true },
  { profile = "worker", may-bypass = false },
  { profile = "reviewer", may-bypass = true },
  { profile = "codex-review", may-bypass = true },
  { profile = "plan", may-bypass = false },
  { profile = "notes", may-bypass = true },
  { profile = "build-runner", may-bypass = true },
  { profile = "git", may-bypass = false },
  { profile = "docker", may-bypass = false },
  { profile = "browser", may-bypass = false },
] } }

[profiles.main]
aliases = ["main"]
tools = [
  "Agent",
  "Read",
  "Search",
  "WebFetch",
  "AskUserQuestion",
  "EnterPlanMode",
  "ExitPlanMode",
  "Task",
  "TaskCreate",
  "TaskUpdate",
  "TaskGet",
  "TaskList",
  "TaskOutput",
  "TodoRead",
  "TodoWrite",
  "Skill",
]
mcp-tools = []
commands = { categories = [] }
agent = { spawn = { allow = [
  { profile = "search", may-bypass = true },
  { profile = "ast-search", may-bypass = true },
  { profile = "lsp-search", may-bypass = true },
  { profile = "curl", may-bypass = true },
  { profile = "docs", may-bypass = true },
  { profile = "worker", may-bypass = false },
  { profile = "reviewer", may-bypass = true },
  { profile = "codex-review", may-bypass = true },
  { profile = "plan", may-bypass = false },
  { profile = "git", may-bypass = false },
  { profile = "notes", may-bypass = true },
  { profile = "build-runner", may-bypass = true },
  { profile = "docker", may-bypass = false },
  { profile = "browser", may-bypass = false },
] } }

[profiles.search]
aliases = ["search"]
tools = ["Read", "Glob", "Grep", "Bash", "Skill"]
mcp-tools = []
commands = { categories = ["fs-read-introspection", "fs-search", "cass"], structure = { single-command = true, no-redirection = true } }

