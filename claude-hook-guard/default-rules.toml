[safety.rm-no-recursive]
kind = "deny-flags"
command = { prefix = ["rm"] }
flags = ["-r", "-R", "--recursive"]
message = "BLOCKED: recursive rm is not allowed."

[safety.find-no-exec-or-write-actions]
kind = "deny-flags"
command = { prefix = ["find"] }
flags = ["-delete", "-exec", "-execdir", "-ok", "-okdir", "-fprint", "-fprintf"]
message = "BLOCKED: find actions that execute commands or write files are not allowed."

[safety.fd-no-exec-actions]
kind = "deny-flags"
command = { prefix = ["fd"] }
flags = ["-x", "--exec", "-X", "--exec-batch"]
message = "BLOCKED: fd exec actions are not allowed."

[safety.rg-no-preprocessor]
kind = "deny-flags"
command = { prefix = ["rg"] }
flags = ["--pre"]
message = "BLOCKED: rg preprocessors are not allowed."

[safety.git-add-explicit-files]
kind = "require-explicit-pathspecs"
command = { prefix = ["git", "add"] }
forbid = [".", "-A", "--all"]
message = "BLOCKED: git add must name explicit file paths."

[safety.git-commit-no-amend]
kind = "deny-flags"
command = { prefix = ["git", "commit"] }
flags = ["--amend"]
message = "BLOCKED: git commit --amend is not allowed."

[safety.curl-hubapi-domain-only]
kind = "require-curl-url-prefix"
command = { prefix = ["curl"] }
prefixes = ["https://api.hubapi.com"]
message = "BLOCKED: curl is only allowed against https://api.hubapi.com."

[safety.curl-allowed-methods]
kind = "allow-curl-methods"
command = { prefix = ["curl"] }
prefixes = ["GET", "POST", "PUT", "PATCH"]
message = "BLOCKED: curl only allows GET, POST, PUT, and PATCH methods for the curl profile."

[safety.curl-allowed-headers]
kind = "allow-curl-headers"
command = { prefix = ["curl"] }
prefixes = ["Authorization: Bearer ", "Content-Type: application/json"]
message = "BLOCKED: curl only allows Authorization Bearer and Content-Type: application/json headers."

[safety.curl-allowed-import-forms]
kind = "allow-curl-forms"
command = { prefix = ["curl"] }
targets = ["https://api.hubapi.com/crm/v3/imports"]
prefixes = ["importRequest=</tmp/", "files=@/tmp/"]
message = "BLOCKED: multipart curl is only allowed for HubSpot imports with /tmp importRequest and files form fields."

[safety.curl-no-unsafe-flags]
kind = "deny-flags"
command = { prefix = ["curl"] }
flags = [
  "-o",
  "-O",
  "--output",
  "--remote-name",
  "-T",
  "--upload-file",
  "--form-string",
  "-K",
  "--config",
  "-E",
  "--cert",
  "--key",
  "-u",
  "--user",
  "-b",
  "--cookie",
  "-c",
  "--cookie-jar",
  "-x",
  "--proxy",
]
message = "BLOCKED: curl flags that write files, upload data, or inject broader transport/auth state are not allowed."

[safety.git-commit-no-empty]
kind = "deny-flags"
command = { prefix = ["git", "commit"] }
flags = ["--allow-empty"]
message = "BLOCKED: empty commits are not allowed."

[safety.git-push-no-force]
kind = "deny-flags"
command = { prefix = ["git", "push"] }
flags = ["--force", "-f", "--delete"]
message = "BLOCKED: force/delete push is not allowed."

[safety.git-push-explicit-branch]
kind = "require-explicit-push-target"
command = { prefix = ["git", "push"] }
message = "BLOCKED: git push requires explicit remote and branch."

[safety.git-push-no-protected]
kind = "deny-protected-branch"
command = { prefix = ["git", "push"] }
branches = ["main", "master", "develop"]
message = "BLOCKED: push to protected branch is not allowed."

[safety.git-rebase-requires-confirmation]
kind = "deny-always"
command = { prefix = ["git", "rebase"] }
allow-exact = [["git", "rebase", "origin/main"]]
message = "BLOCKED: git rebase requires explicit user confirmation. Ask the user first."

[safety.docker-logs-bounded]
kind = "require-bounded-logs"
command = { prefix = ["docker", "logs"] }
message = "BLOCKED: docker logs requires --tail or equivalent bound."

[safety.docker-no-exec]
kind = "deny-always"
command = { prefix = ["docker", "exec"] }
message = "BLOCKED: docker exec is not allowed."

[safety.docker-no-destructive]
kind = "deny-subcommands"
command = { prefix = ["docker"] }
subcommands = [
  ["rm"],
  ["rmi"],
  ["system", "prune"],
  ["volume", "rm"],
  ["network", "rm"],
]
message = "BLOCKED: destructive docker command is not allowed."
